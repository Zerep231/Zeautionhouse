# ZeAuctionHouse V3.3 Configuration

database:
  type: sqlite   # sqlite or mysql
  host: localhost
  port: 3306
  database: zeauctionhouse
  user: root
  password: ''
  pool-size: 10

cache:
  ttl-seconds: 10

session:
  timeout-minutes: 5

limits:
  max-listings-per-player: 10
  max-total-listings: 1000
  max-price: 999999.0
  min-price: 1.0
  listing-fee-percent: 0.0   # 0 = disabled

expire:
  check-interval-minutes: 10
  default-days: 7

log:
  enabled: true
  rotation-days: 30

blacklist:
  - BEDROCK
  - COMMAND_BLOCK
  - COMMAND_BLOCK_MINECART
  - STRUCTURE_BLOCK
  - BARRIER
  - DEBUG_STICK
  - KNOWLEDGE_BOOK

shop:
  enabled: true
  categories:
    - stone
    - wood
    - glass
    - decoration
    - plants
    - nether
    - end

lang: en
