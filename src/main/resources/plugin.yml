name: ZeAuctionHouse
version: '${project.version}'
main: dev.zerep.zeah.ZeAuctionHouse
api-version: '1.21'
description: Item-economy auction house for Paper 1.21.1+ — no Vault required
authors: [Zerep231]
website: https://github.com/Zerep231/Zeautionhouse

commands:
  ah:
    description: Main AuctionHouse command
    usage: /ah [browse|sell|claim|shop|mylistings|reload]
    aliases: [auctionhouse, auction]

permissions:
  zeah.use:
    description: Use the auction house
    default: true
  zeah.sell:
    description: List items for sale
    default: true
  zeah.claim:
    description: Claim delivered items
    default: true
  zeah.shop:
    description: Use the builder shop
    default: true
  zeah.admin:
    description: Admin commands (reload, etc.)
    default: op
  zeah.bypass.limit:
    description: Bypass max listing limit
    default: op
  zeah.bypass.blacklist:
    description: Sell blacklisted items
    default: op
